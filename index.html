<!--
  La página HTML donde vive Kalamar.
  No tiene casi nada porque React se encarga de construir todo desde
  el div#root. Las etiquetas meta son para que al instalarse como PWA
  en el iPhone se vea bien (pantalla completa, barra negra, etc.).
  Importancia: 🟡 Media (sin esto no hay dónde cargar la app).
-->
<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Kalamar" />
    <meta name="description" content="Control de gastos personal con voz" />
    <title>Kalamar</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
